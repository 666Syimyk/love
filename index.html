<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя, самая любимая</title>
    <style>
        :root {
            --accent: #ff4d6d;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* Анимация сердец */
        .hearts {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .heart {
            position: absolute;
            color: var(--accent);
            font-size: 18px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Главный экран */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), var(--bg)), 
                        url('WhatsApp Image 2026-03-30 at 11.32.55.jpeg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(2rem, 10vw, 4.5rem);
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #ff758f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Сетка с фото */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .letter {
            text-align: center;
            padding: 60px 0;
            font-size: 1.3rem;
            color: #d1d1d1;
            line-height: 1.8;
        }

        .grid {
            display: columns;
            column-count: 3;
            column-gap: 20px;
        }

        @media (max-width: 900px) { .grid { column-count: 2; } }
        @media (max-width: 600px) { .grid { column-count: 1; } }

        .item {
            margin-bottom: 20px;
            break-inside: avoid;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px;
            transition: 0.4s;
        }

        .item:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(255, 77, 109, 0.3);
        }

        .item img, .item video {
            width: 100%;
            border-radius: 15px;
            display: block;
        }

        .footer-btn {
            text-align: center;
            margin-top: 80px;
            margin-bottom: 100px;
        }

        .btn {
            padding: 20px 50px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
        }

        .btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="hearts" id="hearts"></div>

    <section class="hero">
        <h1>Я очень тебя люблю</h1>
        <p style="opacity: 0.7; margin-top: 15px;">Прости меня за всё...</p>
    </section>

    <div class="container">
        <div class="letter">
            <p>Мы столько всего прошли вместе. Каждое это фото — бесценное воспоминание о том дне, когда мы были самыми счастливыми. Я не хочу это терять.</p>
        </div>

        <div class="grid">
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.55 (2).jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.55.jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.56 (1).jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.56 (2).jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.56 (3).jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.56 (4).jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.56.jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.57.jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.57 (1).jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.57 (2).jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.58.jpeg"></div>
            <div class="item"><img src="WhatsApp Image 2026-03-30 at 11.32.59.jpeg"></div>
            
            <div class="item">
                <video controls>
                    <source src="WhatsApp Video 2026-03-30 at 11.33.42.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="footer-btn">
            <a href="https://github.com/" class="btn">Давай поговорим?</a>
        </div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.opacity = Math.random();
            document.getElementById('hearts').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
</html>
