<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, transparent 60%, #0a0a0a 100%), 
                        url('IMG_20260330_120928_539.jpg');
            background-size: cover;
            background-position: center;
            width: 100%;
        }

        h1 { font-size: 3.5rem; margin-bottom: 10px; color: #f0f0f0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        p.subtitle { font-size: 1.4rem; color: #aaa; margin-top: 0; }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 60px 20px;
            max-width: 1400px;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card:hover { 
            transform: translateY(-8px); 
            border-color: #444; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        .card img, .card video {
            width: 100%;
            height: auto; /* Позволяем высоте адаптироваться под фото */
            max-height: 450px; /* Ограничиваем максимальную высоту */
            object-fit: cover;
            display: block;
        }

        .message-section {
            padding: 80px 20px;
            text-align: center;
            max-width: 800px;
        }

        .message-section h2 {
            font-size: 2.5rem;
            color: #eaeaea;
            margin-bottom: 20px;
        }

        .message-section p {
            font-size: 1.2rem;
            color: #bbbbbb;
            margin-bottom: 40px;
        }

        .btn-github {
            padding: 18px 35px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background 0.2s ease;
            display: inline-block;
        }

        .btn-github:hover {
            background: #eee;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            p.subtitle { font-size: 1.1rem; }
            .memory-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); padding: 40px 15px; }
        }
    </style>
</head>
<body>

    <section class="header">
        <h1>Прости меня</h1>
        <p class="subtitle">Я помню каждый наш момент...</p>
    </section>

    <section class="message-section">
        <h2>Наши общие воспоминания</h2>
        <p>Мы давно не общались, но эти фото напоминают мне о том, как нам было хорошо вместе. Я ценю каждый миг, проведённый с тобой, и хочу всё исправить.</p>
    </section>

    <div class="memory-grid">
        <div class="card"><img src="IMG_20260330_120928_539.jpg" alt="Воспоминание 1"></div>
        <div class="card"><img src="IMG_20260330_120918_784.jpg" alt="Воспоминание 2"></div>
        <div class="card"><img src="IMG_20260330_120918_758.jpg" alt="Воспоминание 3"></div>
        <div class="card"><img src="IMG_20260330_120900_796.jpg" alt="Воспоминание 4"></div>
        <div class="card"><img src="IMG_20260330_120853_473.jpg" alt="Воспоминание 5"></div>
        <div class="card"><img src="IMG_20260330_120817_840.jpg" alt="Воспоминание 6"></div>
        <div class="card"><img src="IMG_20260330_120817_471.jpg" alt="Воспоминание 7"></div>
        <div class="card"><img src="IMG_20260330_120928_407.jpg" alt="Воспоминание 8"></div>
        <div class="card"><img src="IMG_20260325_221114_181.jpg" alt="Воспоминание 9"></div>
        <div class="card"><img src="IMG_20260330_120918_587.jpg" alt="Воспоминание 10"></div>
        <div class="card"><img src="IMG_20260330_120918_879.jpg" alt="Воспоминание 11"></div>
        <div class="card"><img src="IMG-20250715-WA0135.jpg" alt="Воспоминание 12"></div>
        
        <div class="card">
            <video controls preload="metadata">
                <source src="VID_20260330_120929_114.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        </div>
    </div>

    <section class="message-section">
        <p>Я очень скучаю. Если ты готова поговорить, нажми кнопку ниже.</p>
        <a href="https://github.com/ВАШ_ПРОФИЛЬ" class="btn-github">Написать мне (GitHub)</a>
    </section>

</body>
</html>
